name: Deploy frontend to GitHub Pages

# Builds the Vite frontend and publishes frontend/dist to GitHub Pages on every
# push to master that touches the frontend. One-time setup is required:
#   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# To point the app at a deployed backend, set an Actions *variable* named
# VITE_API_URL (Settings -> Secrets and variables -> Actions -> Variables), e.g.
#   https://your-backend-host/parse-blocks
# When unset, the build falls back to http://localhost:8000/parse-blocks.

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: {}

# Allow the deploy job to mint an OIDC token and publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          # Project site lives under /portal-mapper/ — must match the repo name.
          VITE_BASE: /portal-mapper/
          # Backend API URL baked into the bundle at build time (may be empty).
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
