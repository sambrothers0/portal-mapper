# portal-mapper reverse proxy + static host.
#
# Drop this in as the site config (e.g. /etc/nginx/conf.d/portal-mapper.conf).
# The `limit_*_zone` directives below sit at the top level of this file, which
# nginx evaluates inside its `http {}` context — that is where shared rate/conn
# zones must be declared. Reload with `nginx -t && systemctl reload nginx`.
#
# This config does the public-facing security that can't live in the app:
#   - per-IP request-rate limit and simultaneous-connection cap (anti-flood)
#   - 4 GB body ceiling (matches the app + frontend limits)
#   - streams the upload straight to the backend (no 4 GB buffered on nginx)
#   - long read/send timeouts so a legitimate multi-minute scan isn't cut off
# The app itself still serializes scans (MAX_CONCURRENT_SCANS) — these layers
# are complementary: nginx throttles who gets in, the app bounds what runs.

# --- shared limiter state (http context) ---------------------------------
# Rate: how often a single IP may start a request. Scans are infrequent and
# heavy, so this is deliberately low; `burst` absorbs a couple of quick retries.
limit_req_zone  $binary_remote_addr  zone=parse_rate:10m  rate=20r/m;
# Cap simultaneous connections per IP so one client can't open many parallel
# 4 GB uploads at once (each would otherwise stream into the backend together).
limit_conn_zone $binary_remote_addr  zone=parse_conn:10m;

# Return clean JSON (matching the API) when a limiter trips, not nginx HTML.
limit_req_status  429;
limit_conn_status 429;

# --- HTTP: redirect everything to HTTPS -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;
    # Allow certbot's ACME challenge through before redirecting.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS: static frontend + API proxy -----------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;  # replace with your domain once you have one

    # TLS — obtain with: certbot --nginx  (or point these at your certs).
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # The frontend `npm run build` output (dist/) goes here.
    root  /usr/share/nginx/html;
    index index.html;

    # Static SPA: serve files, fall back to index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The one heavy endpoint — everything protective is scoped to it.
    location /parse-blocks {
        limit_req  zone=parse_rate burst=5 nodelay;
        limit_conn parse_conn 3;

        # 4 GB ceiling (a touch over for multipart overhead), same as the app.
        client_max_body_size 4500M;

        # Stream the body to the backend as it arrives instead of buffering the
        # whole 4 GB upload to nginx's disk first — faster start, no double I/O.
        proxy_request_buffering off;
        # The backend reads from Starlette's spooled file; don't buffer its
        # response back through nginx either (large match JSON).
        proxy_buffering off;

        # A full 4 GB scan can run for many minutes; don't sever it.
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        # Window for the (large, slow) upload body between reads.
        client_body_timeout 300s;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://127.0.0.1:8000;
    }
}
